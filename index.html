<!DOCTYPE html>
<html>
<head>

<title>Smart PDF Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
  transition: 0.3s;
}

/* LIGHT MODE */
.light {
  background: #f1f5f9;
  color: black;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 15px;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: -220px;
  top: 0;
  width: 220px;
  height: 100%;
  background: #0f172a;
  padding: 20px;
  transition: 0.3s;
  z-index: 1000;
}

.sidebar.active { left: 0; }

.sidebar a {
  display: block;
  margin: 12px 0;
  color: white;
  text-decoration: none;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  z-index: 999;
}

.overlay.active { display: block; }

/* HEADER */
.header {
  text-align: center;
}

.search-box {
  display: flex;
  gap: 10px;
}

.search-box input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

.search-box button {
  padding: 12px;
  border-radius: 10px;
  background: #22c55e;
  border: none;
  color: white;
  cursor: pointer;
}

/* TOOLS */
.tools {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px,1fr));
  gap: 12px;
  margin-top: 20px;
}

.tool {
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.tool:hover {
  transform: scale(1.05);
  background: #1e293b;
}

/* DROP AREA */
.drop-area {
  border: 2px dashed #22c55e;
  padding: 20px;
  margin-top: 20px;
  border-radius: 12px;
  text-align: center;
  opacity: 0.8;
}

/* CARD */
.card {
  background: #0f172a;
  padding: 12px;
  margin-top: 15px;
  border-radius: 10px;
}

/* REVIEW */
.review-box input, textarea {
  width: 100%;
  margin-top: 5px;
  padding: 8px;
  border-radius: 8px;
  border: none;
}

.review-box button {
  margin-top: 8px;
  background: #22c55e;
  border: none;
  padding: 8px;
  border-radius: 8px;
  color: white;
}

.review {
  background: #334155;
  margin-top: 8px;
  padding: 8px;
  border-radius: 8px;
}

/* LOADER */
.loader {
  display: none;
  text-align: center;
  margin-top: 10px;
}

/* AI */
.ai-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  padding: 15px;
  border-radius: 50%;
}

.ai-chat {
  position: fixed;
  bottom: 80px;
  right: 20px;
  background: #0f172a;
  padding: 10px;
  border-radius: 10px;
  display: none;
}

footer {
  text-align: center;
  margin-top: 20px;
}

</style>

</head>

<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
  <a href="merge.html">Merge PDF</a>
  <a href="split.html">Split PDF</a>
  <a href="compress.html">Compress PDF</a>
  <a href="image.html">Image to PDF</a>
</div>

<div class="nav">
  <button onclick="openMenu()">☰</button>
  <b>Smart PDF Tools</b>
  <button onclick="toggleMode()">🌗</button>
</div>

<div class="container">

<div class="header">
  <h2>🚀 Smart PDF Tools</h2>

  <div class="search-box">
    <input id="cmd" placeholder="merge pdf, compress">
    <button onclick="runAI()">Run</button>
  </div>
</div>

<!-- TOOLS -->
<div class="tools">
<div class="tool" onclick="go('merge.html')">Merge</div>
<div class="tool" onclick="go('split.html')">Split</div>
<div class="tool" onclick="go('compress.html')">Compress</div>
<div class="tool" onclick="go('image.html')">Image</div>
<div class="tool" onclick="go('compress-100kb.html')">100KB</div>
</div>

<!-- DRAG DROP -->
<div class="drop-area" id="drop">
📂 Drag & Drop your file here
</div>

<div class="loader" id="loader">⚡ Processing...</div>

<div class="card">
Fast, secure PDF tools. No upload. Instant processing.
</div>

<!-- REVIEWS -->
<div class="card review-box">
<h3>⭐ Reviews</h3>

<input id="nameInput" placeholder="Your name">
<textarea id="msgInput" placeholder="Your review"></textarea>

<select id="ratingSelect">
<option>⭐</option>
<option>⭐⭐</option>
<option>⭐⭐⭐</option>
<option>⭐⭐⭐⭐</option>
<option>⭐⭐⭐⭐⭐</option>
</select>

<button onclick="addReview()">Submit</button>

<div id="reviews"></div>

</div>

<footer>© 2026 Smart PDF Tools</footer>

</div>

<div class="ai-btn" onclick="toggleAI()">💬</div>

<div class="ai-chat" id="aiBox">
<input id="aiInput" placeholder="Type command">
<button onclick="runAI()">Go</button>
</div>

<script>

function go(p){window.location=p;}

function openMenu(){
  sidebar.classList.add("active");
  overlay.classList.add("active");
}

function closeMenu(){
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
}

function toggleMode(){
  document.body.classList.toggle("light");
}

function toggleAI(){
  let b=document.getElementById("aiBox");
  b.style.display = b.style.display==="block" ? "none" : "block";
}

/* AI COMMAND */
function runAI(){
  let c=document.getElementById("cmd").value.toLowerCase();

  if(c.includes("merge")) go("merge.html");
  else if(c.includes("split")) go("split.html");
  else if(c.includes("image")) go("image.html");
  else if(c.includes("100")) go("compress-100kb.html");
  else if(c.includes("compress")) go("compress.html");
}

/* DRAG DROP */
let drop=document.getElementById("drop");

drop.ondragover=e=>{
  e.preventDefault();
  drop.style.background="#1e293b";
};

drop.ondragleave=e=>{
  drop.style.background="";
};

drop.ondrop=e=>{
  e.preventDefault();
  loader.style.display="block";

  setTimeout(()=>{
    loader.style.display="none";
    alert("File ready! Choose tool now.");
  },1500);
};

/* REVIEWS */
function addReview(){
  let name=nameInput.value;
  let msg=msgInput.value;
  let rating=ratingSelect.value;

  let r = `${rating} ${name}: ${msg}`;

  let arr=JSON.parse(localStorage.getItem("reviews")||"[]");
  arr.push(r);
  localStorage.setItem("reviews", JSON.stringify(arr));

  loadReviews();
}

function loadReviews(){
  let arr=JSON.parse(localStorage.getItem("reviews")||"[]");
  reviews.innerHTML="";
  arr.forEach(x=>{
    reviews.innerHTML+=`<div class="review">${x}</div>`;
  });
}

loadReviews();

</script>

</body>
  </html>
