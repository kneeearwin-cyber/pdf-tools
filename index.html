<!DOCTYPE html>
<html>
<head>

<title>Smart PDF Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
  transition: 0.3s;
}

/* LIGHT MODE */
.light {
  background: #f1f5f9;
  color: black;
}

.light .card,
.light .tool,
.light .sidebar,
.light .review-box {
  background: white;
  color: black;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #020617;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: -220px;
  top: 0;
  width: 220px;
  height: 100%;
  background: #0f172a;
  padding: 20px;
  transition: 0.3s;
}

.sidebar.active { left: 0; }

.sidebar a {
  display: block;
  margin: 10px 0;
  color: white;
  text-decoration: none;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
}

.overlay.active { display: block; }

/* HEADER */
.header {
  text-align: center;
  padding: 25px;
}

.search-box input {
  width: 60%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.search-box button {
  padding: 10px;
  border-radius: 10px;
  background: #22c55e;
  border: none;
  color: white;
}

/* TOOLS */
.tools {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
  gap: 10px;
  padding: 20px;
}

.tool {
  background: #0f172a;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

/* SECTION */
.section {
  padding: 20px;
}

/* CARDS */
.card {
  background: #0f172a;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
}

/* REVIEW SYSTEM */
.review-box {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

.review-box input, textarea {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

.review-box button {
  background: #22c55e;
  border: none;
  padding: 8px;
  border-radius: 8px;
  color: white;
}

.review {
  background: #334155;
  padding: 8px;
  margin-top: 8px;
  border-radius: 8px;
}

/* AI */
.ai-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  padding: 15px;
  border-radius: 50%;
}

.ai-chat {
  position: fixed;
  bottom: 80px;
  right: 20px;
  background: #0f172a;
  padding: 10px;
  border-radius: 10px;
  display: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
}

</style>

</head>

<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
  <a href="merge.html">Merge PDF</a>
  <a href="split.html">Split PDF</a>
  <a href="compress.html">Compress PDF</a>
  <a href="image.html">Image to PDF</a>
</div>

<div class="nav">
  <button onclick="openMenu()">☰</button>
  <b>Smart PDF Tools</b>
  <button onclick="toggleMode()">🌗</button>
</div>

<div class="header">
  <h2>🚀 Smart PDF Tools</h2>

  <div class="search-box">
    <input id="cmd" placeholder="merge pdf, compress">
    <button onclick="runAI()">Run</button>
  </div>
</div>

<div class="tools">
<div class="tool" onclick="go('merge.html')">Merge</div>
<div class="tool" onclick="go('split.html')">Split</div>
<div class="tool" onclick="go('compress.html')">Compress</div>
<div class="tool" onclick="go('image.html')">Image</div>
<div class="tool" onclick="go('compress-100kb.html')">100KB</div>
</div>

<div class="section">
<h3>About</h3>
<div class="card">Fast, secure PDF tools with no upload.</div>
</div>

<!-- REVIEW SYSTEM -->
<div class="section">
<h3>User Reviews ⭐</h3>

<div class="review-box">
<input id="name" placeholder="Your name">
<textarea id="msg" placeholder="Your review"></textarea>

<select id="rating">
<option>⭐</option>
<option>⭐⭐</option>
<option>⭐⭐⭐</option>
<option>⭐⭐⭐⭐</option>
<option>⭐⭐⭐⭐⭐</option>
</select>

<button onclick="addReview()">Submit</button>
</div>

<div id="reviews"></div>

</div>

<!-- AI -->
<div class="ai-btn" onclick="toggleAI()">💬</div>

<div class="ai-chat" id="aiBox">
<input id="aiInput" placeholder="Type command">
<button onclick="runAI()">Go</button>
</div>

<footer>© 2026 Smart PDF Tools</footer>

<script>

function go(p){window.location=p;}

function openMenu(){
  sidebar.classList.add("active");
  overlay.classList.add("active");
}

function closeMenu(){
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
}

function toggleMode(){
  document.body.classList.toggle("light");
}

function toggleAI(){
  let b=document.getElementById("aiBox");
  b.style.display = b.style.display==="block" ? "none" : "block";
}

function runAI(){
  let c=document.getElementById("cmd").value.toLowerCase();

  if(c.includes("merge")) go("merge.html");
  else if(c.includes("split")) go("split.html");
  else if(c.includes("image")) go("image.html");
  else if(c.includes("100")) go("compress-100kb.html");
  else if(c.includes("compress")) go("compress.html");
}

/* REVIEW SYSTEM */
function addReview(){
  let name=document.getElementById("name").value;
  let msg=document.getElementById("msg").value;
  let rating=document.getElementById("rating").value;

  let review = `${rating} ${name}: ${msg}`;

  let reviews = JSON.parse(localStorage.getItem("reviews")||"[]");
  reviews.push(review);

  localStorage.setItem("reviews", JSON.stringify(reviews));

  loadReviews();
}

function loadReviews(){
  let reviews = JSON.parse(localStorage.getItem("reviews")||"[]");
  let div=document.getElementById("reviews");
  div.innerHTML="";

  reviews.forEach(r=>{
    div.innerHTML += `<div class="review">${r}</div>`;
  });
}

loadReviews();

</script>

</body>
</html>
