<!DOCTYPE html>
<html>
<head>
    <title>Split PDF</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; padding:20px;">

<h2>✂️ Split PDF</h2>

<input type="file" id="pdfFile" accept="application/pdf">
<br><br>

<input type="number" id="pageNumber" placeholder="Enter page number">
<br><br>

<button onclick="splitPDF()">Split</button>

<p id="status"></p>

<!-- pdf-lib -->
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
async function splitPDF() {

    const fileInput = document.getElementById("pdfFile");
    const pageNumber = parseInt(document.getElementById("pageNumber").value);
    const status = document.getElementById("status");

    if (!fileInput.files.length || !pageNumber) {
        alert("Select file and enter page number");
        return;
    }

    status.innerText = "Processing...";

    const file = fileInput.files[0];
    const arrayBuffer = await file.arrayBuffer();

    const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);

    const totalPages = pdfDoc.getPageCount();

    if (pageNumber >= totalPages) {
        status.innerText = "Invalid page number ❌";
        return;
    }

    // First part
    const pdf1 = await PDFLib.PDFDocument.create();
    const pages1 = await pdf1.copyPages(pdfDoc, [...Array(pageNumber).keys()]);
    pages1.forEach(p => pdf1.addPage(p));

    const pdfBytes1 = await pdf1.save();

    // Second part
    const pdf2 = await PDFLib.PDFDocument.create();
    const pages2 = await pdf2.copyPages(
        pdfDoc,
        [...Array(totalPages - pageNumber).keys()].map(i => i + pageNumber)
    );
    pages2.forEach(p => pdf2.addPage(p));

    const pdfBytes2 = await pdf2.save();

    // Download files
    downloadPDF(pdfBytes1, "part1.pdf");
    downloadPDF(pdfBytes2, "part2.pdf");

    status.innerText = "Done ✅";
}

function downloadPDF(bytes, filename) {
    const blob = new Blob([bytes], { type: "application/pdf" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
}
</script>

</body>
  </html>
